<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bigger Picture</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      color: #111;
      background: #fff;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .image-side {
      background-image: url("landing.png");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }

    .content-side {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .content {
      max-width: 760px;
      width: 100%;
    }

    h1 {
      font-family: "Brush Script MT", cursive;
      font-size: 48px;
      font-weight: 400;
      margin-bottom: 45px;
    }

    p {
      font-size: 18px;
      line-height: 1.55;
      margin-bottom: 34px;
    }

    .form-box {
      margin-top: 45px;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .image-side {
        min-height: 45vh;
      }

      .content-side {
        padding: 40px 24px;
      }

      h1 {
        font-size: 42px;
      }

      p {
        font-size: 17px;
      }
    }
  </style>

</head>

<body>
  <main class="page">
    <section class="image-side"></section>

    <section class="content-side">
      <div class="content">
        <h1>Bienvenido!</h1>

        <p>
          Dejá tu email y recibí el diccionario vivo del proyecto: conceptos clave
